server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: users-config-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/stamina}
    username: ${SPRING_DATASOURCE_USERNAME:stamina}
    password: ${SPRING_DATASOURCE_PASSWORD:stamina_dev_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

etoro:
  api-base-url: ${ETORO_API_BASE_URL:https://api.example-etoro.local}
  api-key: ${ETORO_API_KEY:replace_me}
  account-id: ${ETORO_ACCOUNT_ID:replace_me}

